name: 三井のすまい 予約監視

on:
  schedule:
    - cron: '*/5 * * * *'   # 5分ごとに実行（GitHub Actionsの最短間隔）
  workflow_dispatch:         # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      # 前回の状態ファイルをキャッシュから復元（重複通知を防ぐため）
      - name: 前回の状態を復元
        uses: actions/cache@v4
        with:
          path: reservation_state.json
          key: reservation-state-${{ github.run_id }}
          restore-keys: |
            reservation-state-

      - name: 予約状況チェック＆LINE通知
        run: python monitor.py
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
